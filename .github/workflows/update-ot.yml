name: Update Data for OT

on:
  schedule:
    - cron: '23 01 21,28 2,5,8,11 *'
  workflow_dispatch:

jobs:
  call-reusable-workflow:
    # ADR 034/035: target=v3 → OIDC/SigV4. id-token:write MUST be granted here on
    # the caller — a reusable workflow's own id-token permission is capped by
    # the caller's token, so without this the gha-v3-loader role assumption
    # fails on the cron path (the direct-dispatch canary did not exercise this).
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/reusable-update.yml
    secrets:
      TF_VAR_ELASTIC_V3_HOST: ${{ secrets.TF_VAR_ELASTIC_V3_HOST }}
    with:
      state: OT
      target: v3
