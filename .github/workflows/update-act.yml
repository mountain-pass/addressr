name: Update Data for ACT

on:
  schedule:
    - cron: '28 01 21,28 2,5,8,11 *'
  workflow_dispatch:

jobs:
  call-reusable-workflow:
    # ADR 034/035: target=v3 → OIDC/SigV4. id-token:write MUST be granted here on
    # the caller — a reusable workflow's id-token is capped by the caller's
    # token (verified via the OT caller-chain canary 2026-07-11).
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/reusable-update.yml
    secrets:
      TF_VAR_ELASTIC_V3_HOST: ${{ secrets.TF_VAR_ELASTIC_V3_HOST }}
    with:
      state: ACT
      target: v3
