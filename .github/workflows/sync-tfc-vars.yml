# ADR 029 re-attempt item 6(d) + ADR 030 credential-wiring amendment 2026-07-07:
# mechanises the GHA → TFC leg of the v2 credential plane so three-plane
# consistency (GHA / TFC / EB) holds by construction instead of operator
# memory — the manual-copy leg is exactly where P028 happened. GHA secrets are
# the effective source of truth; TFC workspace variables are mechanically
# downstream. Values are never echoed (sensitive TFC vars are write-only);
# verification is write-path success (non-2xx fails the job).
name: Sync TFC v2 Variables

on:
  workflow_dispatch:

permissions: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync elastic_v2_* variables to TFC workspace addressr-prod
        env:
          TFC_TOKEN: ${{ secrets.TERRAFORM_CLOUD_TOKEN }}
          V2_USERNAME: ${{ secrets.TF_VAR_ELASTIC_V2_USERNAME }}
          V2_PASSWORD: ${{ secrets.TF_VAR_ELASTIC_V2_PASSWORD }}
        run: |
          set -euo pipefail
          BASE=https://app.terraform.io/api/v2
          auth=(-H "Authorization: Bearer $TFC_TOKEN" -H "Content-Type: application/vnd.api+json")

          code=$(curl -sS "${auth[@]}" -o ws.json -w '%{http_code}' \
            "$BASE/organizations/mountainpass/workspaces/addressr-prod")
          [ "$code" = "200" ] || { echo "workspace lookup failed: HTTP $code"; exit 1; }
          WS=$(jq -r .data.id ws.json)
          echo "workspace addressr-prod = $WS"

          code=$(curl -sS "${auth[@]}" -o vars.json -w '%{http_code}' "$BASE/workspaces/$WS/vars")
          [ "$code" = "200" ] || { echo "vars list failed: HTTP $code"; exit 1; }

          var_id() {
            jq -r --arg k "$1" \
              '.data[] | select(.attributes.key==$k and .attributes.category=="terraform") | .id' vars.json
          }

          upsert() {
            key=$1 val=$2
            id=$(var_id "$key")
            if [ -n "$id" ]; then
              payload=$(jq -n --arg id "$id" --arg k "$key" --arg v "$val" \
                '{data:{type:"vars",id:$id,attributes:{key:$k,value:$v,category:"terraform",sensitive:true}}}')
              code=$(curl -sS "${auth[@]}" -X PATCH -o /dev/null -w '%{http_code}' \
                --data "$payload" "$BASE/workspaces/$WS/vars/$id")
            else
              payload=$(jq -n --arg k "$key" --arg v "$val" \
                '{data:{type:"vars",attributes:{key:$k,value:$v,category:"terraform",sensitive:true}}}')
              code=$(curl -sS "${auth[@]}" -X POST -o /dev/null -w '%{http_code}' \
                --data "$payload" "$BASE/workspaces/$WS/vars")
            fi
            case "$code" in 2??) echo "synced $key (HTTP $code)";; *) echo "FAILED $key: HTTP $code"; exit 1;; esac
          }

          upsert elastic_v2_username "$V2_USERNAME"
          upsert elastic_v2_password "$V2_PASSWORD"

          # Stale-override cleanup (architect amendment 2, 2026-07-07): attempt-1
          # left overrides that would shadow the repo defaults — a stale
          # elastic_v2_name recreates the double-prefixed
          # search-search-addressr4-… endpoint. Delete so vars.tf defaults apply.
          for k in elastic_v2_name elastic_v2_engine_version elastic_v1_domain_name; do
            id=$(var_id "$k")
            if [ -n "$id" ]; then
              code=$(curl -sS "${auth[@]}" -X DELETE -o /dev/null -w '%{http_code}' \
                "$BASE/workspaces/$WS/vars/$id")
              case "$code" in 2??) echo "deleted stale $k override (HTTP $code)";; *) echo "FAILED deleting $k: HTTP $code"; exit 1;; esac
            else
              echo "no stale $k override"
            fi
          done
