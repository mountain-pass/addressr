name: Populate Search Domain

# ADR 029/035: populate the v3 OpenSearch domain (addressr5, OpenSearch 3.5) from
# G-NAF source — a full re-index / rebuild path. Reuses the same loader path as the
# quarterly update-{state}.yml workflows via reusable-update.yml (target=v3,
# OIDC/SigV4). v1 (addressr3) was decommissioned 2026-07-11; v2 (addressr4, 2.19)
# was decommissioned 2026-07-14 (ADR 035 Phase 2 step 6).
#
# Naming is intentionally version-agnostic: the next version-generation upgrade
# adds its target to the enum and the same matrix runs against its domain.

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target search domain (v3 = production OpenSearch 3.5, addressr5; v2/addressr4 decommissioned 2026-07-14, ADR 035 Phase 2 step 6)'
        required: true
        default: 'v3'
        type: choice
        options:
          - v3
      states:
        description: 'States to load (comma-separated, or "all")'
        required: false
        default: 'all'
        type: string

jobs:
  resolve-states:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.r.outputs.matrix }}
    steps:
      - id: r
        env:
          STATES_INPUT: ${{ inputs.states }}
        # State names MUST be uppercase. The loader at
        # service/address-service.js:1340 filters G-NAF detail files via
        # `path.basename(f).startsWith(`${COVERED_STATES[i]}_`)`, matching
        # against uppercase filenames like `OT_ADDRESS_DETAIL_psv.psv`. A
        # lowercase state code makes the filter empty and the loader silently
        # skips address indexing (ends with 0 docs) -- reproduced on populate
        # run 25033129925. The 9 update-{state}.yml workflows pass uppercase
        # (e.g. `state: OT`) and work fine. Both the hardcoded `all` list and
        # the comma-separated input are normalised to upper case here.
        run: |
          set -e
          if [ "$STATES_INPUT" = "all" ]; then
            MATRIX='["ACT","NSW","NT","OT","QLD","SA","TAS","VIC","WA"]'
          else
            # comma-separated -> JSON array, trimming whitespace and uppercasing each element
            MATRIX=$(echo "$STATES_INPUT" | jq -R -s -c 'split(",") | map(gsub("\\s+";"") | ascii_upcase) | map(select(length > 0))')
          fi
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Resolved matrix: $MATRIX"

  populate:
    needs: resolve-states
    # ADR 034/035: target=v3 loads over OIDC/SigV4. id-token:write MUST be
    # granted here on the caller — a reusable workflow's id-token is capped by
    # the caller's token (the ADR-034 caller-chain lesson), so without this the
    # gha-v3-loader role assumption fails. contents:read keeps checkout
    # working once permissions are declared explicitly.
    permissions:
      id-token: write
      contents: read
    strategy:
      # ADR 029 Consequences: G-NAF load against a fresh domain consumes
      # full-dataset compute time and must be scheduled outside peak traffic
      # windows. Sequential default (max-parallel: 1) respects that bulk-load
      # discipline. Operator can edit this workflow file before triggering
      # if they want parallel; doing so puts more concurrent ingest pressure
      # on the v3 domain instance class. The 'fail-fast: false' lets a
      # state's failure not cancel other in-flight states (matters more
      # under operator-overridden parallelism than under sequential).
      fail-fast: false
      max-parallel: 1
      matrix:
        state: ${{ fromJSON(needs.resolve-states.outputs.matrix) }}
    uses: ./.github/workflows/reusable-update.yml
    with:
      state: ${{ matrix.state }}
      target: ${{ inputs.target }}
    secrets: inherit
