name: Reusable Update Workflow

on:
  workflow_call:
    inputs:
      state:
        required: true
        type: string
      target:
        # ADR 029 Phase 1: which OpenSearch domain to populate.
        # 'v1' = the production domain reached via TF_VAR_ELASTIC_HOST (current default).
        # 'v2' = the parallel-provisioned upgrade-target domain reached via
        # TF_VAR_ELASTIC_V2_HOST. The v2 secrets must be set in the repo for
        # target=v2 to succeed; the resolve step below fails loudly if they
        # are missing. The 9 update-{state}.yml workflows do not pass target,
        # so they inherit the v1 default and are unchanged by this addition.
        required: false
        type: string
        default: 'v1'
    secrets:
      TF_VAR_ELASTIC_HOST:
        required: true
      TF_VAR_ELASTIC_PASSWORD:
        required: true
      TF_VAR_ELASTIC_USERNAME:
        required: true
      # ADR 034: target=v2 authenticates via OIDC/SigV4, so only the v2
      # endpoint is still needed as a secret — the v2 basic-auth master
      # user/password are gone (FGAC off since ADR 033).
      TF_VAR_ELASTIC_V2_HOST:
        required: false
  # ADR 034 step-5 canary: run a single-state v2 load directly in GitHub
  # Actions (via `gh workflow run reusable-update.yml -f state=OT -f target=v2`)
  # to exercise the gha-v2-loader OIDC role before flipping the 9 crons. A
  # local run would authenticate as the operator identity, not OIDC, so it
  # would not test the new path. Under workflow_dispatch, secrets.* read repo
  # secrets directly. Does NOT change the workflow_call default (target=v1).
  workflow_dispatch:
    inputs:
      state:
        required: true
        type: string
      target:
        required: false
        type: string
        default: 'v2'

jobs:
  update:
    runs-on: ubuntu-latest
    # ADR 034: id-token needed for the target=v2 OIDC role assumption; the v1
    # default path does not use it. contents:read keeps checkout working once
    # permissions are declared explicitly.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x' # Specify the Node.js version you need

      - name: Resolve target host/credentials
        # Selects the host/username/password that the loader will write to
        # based on inputs.target. Fails loudly if target=v2 is requested but
        # the v2 secrets are not configured -- prevents silent fall-through
        # to v1 from masking a misconfigured Phase 1 step 5 trigger.
        env:
          TARGET: ${{ inputs.target }}
          V1_HOST: ${{ secrets.TF_VAR_ELASTIC_HOST }}
          V1_USER: ${{ secrets.TF_VAR_ELASTIC_USERNAME }}
          V1_PASS: ${{ secrets.TF_VAR_ELASTIC_PASSWORD }}
          V2_HOST: ${{ secrets.TF_VAR_ELASTIC_V2_HOST }}
        run: |
          set -e
          if [ "$TARGET" = "v2" ]; then
            # ADR 034: v2 is SigV4 (FGAC off) — no username/password; the
            # configure-aws-credentials step below supplies the signing creds
            # via the gha-v2-loader OIDC role.
            [ -n "$V2_HOST" ] || { echo "::error::target=v2 but TF_VAR_ELASTIC_V2_HOST is not set"; exit 1; }
            echo "RESOLVED_HOST=$V2_HOST" >> "$GITHUB_ENV"
            echo "RESOLVED_AUTH_MODE=sigv4" >> "$GITHUB_ENV"
            echo "RESOLVED_REGION=ap-southeast-2" >> "$GITHUB_ENV"
            echo "::add-mask::$V2_HOST"
            echo "Resolved target: v2 (SigV4)"
          elif [ "$TARGET" = "v1" ]; then
            [ -n "$V1_HOST" ] || { echo "::error::TF_VAR_ELASTIC_HOST is not set"; exit 1; }
            echo "RESOLVED_HOST=$V1_HOST" >> "$GITHUB_ENV"
            echo "RESOLVED_USERNAME=$V1_USER" >> "$GITHUB_ENV"
            echo "RESOLVED_PASSWORD=$V1_PASS" >> "$GITHUB_ENV"
            echo "Resolved target: v1"
          else
            echo "::error::Unknown target: $TARGET (expected 'v1' or 'v2')"
            exit 1
          fi

      # ADR 034: assume the least-privilege gha-v2-loader role via GitHub OIDC
      # so the loader signs SigV4 requests to v2 with short-lived STS creds.
      # v1 (default target) skips this and uses basic auth as before.
      - name: Configure AWS credentials (v2 SigV4)
        if: inputs.target == 'v2'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::869772437473:role/gha-v2-loader
          aws-region: ap-southeast-2

      - name: Upload
        env:
          ELASTIC_HOST: ${{ env.RESOLVED_HOST }}
          ELASTIC_PASSWORD: ${{ env.RESOLVED_PASSWORD }}
          ELASTIC_USERNAME: ${{ env.RESOLVED_USERNAME }}
          # ADR 034: empty for v1 (es-auth.js defaults to basic); 'sigv4' +
          # region for v2, where es-auth.js signs with the assumed-role creds
          # and ignores any username/password.
          ELASTIC_AUTH_MODE: ${{ env.RESOLVED_AUTH_MODE }}
          ELASTIC_REGION: ${{ env.RESOLVED_REGION }}
          ELASTIC_PORT: 443
          ELASTIC_PROTOCOL: https
          NODE_ENV: production
          ADDRESSR_ENABLE_GEO: 1
          DEBUG: error,api,express:*,swagger-tools*,test,es
        run: |
          set -x
          npm run gen-install-cmd
          chmod +x ./install.sh
          ./install.sh
          env | grep -E '^(ELASTIC)_'
          COVERED_STATES=${{ inputs.state }} NODE_OPTIONS=--max_old_space_size=8196 addressr-loader
          set +x
