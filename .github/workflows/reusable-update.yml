name: Reusable Update Workflow

on:
  workflow_call:
    inputs:
      state:
        required: true
        type: string
      target:
        # ADR 034/035: which OpenSearch domain to load, over OIDC/SigV4. 'v3'
        # (addressr5, OpenSearch 3.5) is the sole production domain since the
        # v2 (addressr4, 2.19) decommission 2026-07-14 (ADR 035 Phase 2 step 6).
        # The 9 update-{state}.yml crons and populate-search-domain.yml all pass
        # target: v3. Kept parameterised for the next version-generation upgrade.
        required: false
        type: string
        default: 'v3'
    secrets:
      # ADR 034/035: the target authenticates via OIDC/SigV4 — the only secret
      # the loader needs is the target domain's endpoint (the v1 basic-auth
      # secrets were removed 2026-07-11 with the v1 decommission; the v2
      # TF_VAR_ELASTIC_V2_HOST input was removed 2026-07-14 with the v2 one).
      TF_VAR_ELASTIC_V3_HOST:
        required: false
  workflow_dispatch:
    inputs:
      state:
        required: true
        type: string
      target:
        required: false
        type: string
        default: 'v3'

jobs:
  update:
    runs-on: ubuntu-latest
    # ADR 034 guard: serialize a state against ITSELF (a cron overlapping its
    # own prior run, or a manual dispatch racing the cron) — queue, never kill
    # a partial ingest. Per-state+target key: distinct states run in parallel
    # (accepted 2026-07-11 — they write disjoint docs; independent per-state
    # crons chosen for isolated failure/retry), so a slow NSW load never blocks
    # OT. cancel-in-progress:false so a running load is never dropped.
    concurrency:
      group: reusable-update-${{ inputs.target }}-${{ inputs.state }}
      cancel-in-progress: false
    # ADR 034/035: id-token needed for the gha-v3-loader OIDC role assumption.
    # contents:read keeps checkout working once permissions are declared
    # explicitly.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x' # Specify the Node.js version you need

      - name: Resolve target host
        # ADR 034/035: v3 is SigV4 (FGAC off) — no username/password. Resolves
        # the target domain's endpoint + the least-privilege OIDC role the
        # configure-aws-credentials step below assumes. Fails loudly on a
        # missing endpoint secret or an unsupported target.
        env:
          TARGET: ${{ inputs.target }}
          V3_HOST: ${{ secrets.TF_VAR_ELASTIC_V3_HOST }}
        run: |
          set -e
          if [ "$TARGET" = "v3" ]; then
            [ -n "$V3_HOST" ] || { echo "::error::target=v3 but TF_VAR_ELASTIC_V3_HOST is not set"; exit 1; }
            echo "RESOLVED_HOST=$V3_HOST" >> "$GITHUB_ENV"
            echo "RESOLVED_ROLE=arn:aws:iam::869772437473:role/gha-v3-loader" >> "$GITHUB_ENV"
            echo "::add-mask::$V3_HOST"
            echo "Resolved target: v3 (SigV4, gha-v3-loader)"
          else
            echo "::error::Unsupported target: $TARGET (expected 'v3')"
            exit 1
          fi
          echo "RESOLVED_AUTH_MODE=sigv4" >> "$GITHUB_ENV"
          echo "RESOLVED_REGION=ap-southeast-2" >> "$GITHUB_ENV"

      # ADR 034/035: assume the least-privilege gha-v3-loader role via GitHub
      # OIDC so the loader signs SigV4 requests with short-lived STS creds.
      # RESOLVED_ROLE is set by the resolve step above.
      - name: Configure AWS credentials (SigV4)
        if: inputs.target == 'v3'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.RESOLVED_ROLE }}
          aws-region: ap-southeast-2

      - name: Upload
        env:
          # ADR 034/035: v3/SigV4 — es-auth.js signs with the assumed-role creds;
          # no username/password (FGAC off).
          ELASTIC_HOST: ${{ env.RESOLVED_HOST }}
          ELASTIC_AUTH_MODE: ${{ env.RESOLVED_AUTH_MODE }}
          ELASTIC_REGION: ${{ env.RESOLVED_REGION }}
          ELASTIC_PORT: 443
          ELASTIC_PROTOCOL: https
          NODE_ENV: production
          ADDRESSR_ENABLE_GEO: 1
          DEBUG: error,api,express:*,swagger-tools*,test,es
        run: |
          set -x
          npm run gen-install-cmd
          chmod +x ./install.sh
          ./install.sh
          env | grep -E '^(ELASTIC)_'
          COVERED_STATES=${{ inputs.state }} NODE_OPTIONS=--max_old_space_size=8196 addressr-loader
          set +x
